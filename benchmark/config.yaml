# Benchmark configuration.
base_model: "nvidia/Nemotron-Mini-4B-Instruct"
qlora_dir: "qlora/fine_tuned_model"
custom_tokenizer: "tokenizer/custom_tokenizer/tokenizer.json"

text_dataset: "dataset/processed_dataset/raw_splits"
